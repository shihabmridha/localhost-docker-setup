services:
  mssql:
    container_name: MSSQL
    image: mcr.microsoft.com/mssql/server:2022-CU17-ubuntu-22.04
    user: root
    ports:
      - 1433:1433
    volumes:
      - ./volumes/mssql:/var/opt/mssql/data
    restart: always
    environment:
      MSSQL_SA_PASSWORD: Password0
      ACCEPT_EULA: Y

  mysql:
    container_name: MySQL
    image: mysql:8.4.8
    ports:
      - 3306:3306
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Password0

  postgres:
    container_name: Postgres
    image: postgres:18.1-alpine
    ports:
      - 5432:5432
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    restart: always
    environment:
      POSTGRES_PASSWORD: Password0
      PGDATA: /var/lib/postgresql/data/pgdata

  drizzle:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: drizzle
    restart: always
    ports:
      - "4983:4983"
    environment:
      PORT: "4983"
      MASTERPASS: Password0
    volumes:
      - ./volumes/drizzle:/app

  mongo:
    container_name: MongoDB
    image: mongo:8.0.5-noble
    ports:
      - 27017:27017
    volumes:
      - ./volumes/mongo:/data/db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: Password0

  redis:
    container_name: Redis
    image: redis:8.4.0-alpine
    ports:
      - 6379:6379
    volumes:
      - ./volumes/redis:/data

  ubuntu:
    container_name: Ubuntu-SSH
    build:
      context: .
      dockerfile: Dockerfile.Ubuntu22.04-ssh
    ports:
      - 22:22
      - 80:80
